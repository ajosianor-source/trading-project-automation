per_listener_settings true
listener 8883
protocol mqtt
allow_anonymous false
require_certificate true
use_identity_as_username true
cafile /run/secrets/device-ca.crt
certfile /run/secrets/gateway.crt
keyfile /run/secrets/gateway.key
tls_version tlsv1.3
ciphers_tls1.3 TLS_AES_256_GCM_SHA384
max_inflight_messages 20
message_size_limit 262144
persistence true
persistence_location /mosquitto/data/
log_type error
log_type warning
# Access control is certificate-identity based and generated from the device registry.
acl_file /mosquitto/config/device.acl

