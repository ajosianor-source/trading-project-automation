global: { scrape_interval: 30s, evaluation_interval: 30s }
rule_files: [alerts.yaml]
scrape_configs:
  - job_name: healthgov
    kubernetes_sd_configs: [{ role: pod }]
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace]
        regex: healthgov
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        regex: http
        action: keep

