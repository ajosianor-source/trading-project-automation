receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  attributes/redact:
    actions:
      - key: patient.name
        action: delete
      - key: patient.identifier
        action: delete
      - key: http.request.body
        action: delete
      - key: authorization
        action: delete
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp/siem:
    endpoint: ${env:SIEM_OTLP_ENDPOINT}
    tls:
      ca_file: /secrets/ca.crt
      cert_file: /secrets/tls.crt
      key_file: /secrets/tls.key
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [otlp/siem]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [otlp/siem]
