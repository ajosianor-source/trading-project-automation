[HealthGov - Repeated denied PHI access]
search = index=healthgov event=phi_access outcome=denied | stats count dc(resource_id) as resources by subject, src_ip | where count > 5
cron_schedule = */5 * * * *
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5

[HealthGov - Break-glass access]
search = index=healthgov purpose_of_use=emergency | table _time subject resource_id justification
cron_schedule = */5 * * * *
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4

