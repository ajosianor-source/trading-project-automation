apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-transit-key-rotation
  namespace: healthgov
spec:
  schedule: "0 0 1 */3 *" # Runs at midnight on the 1st day of every 3rd month (90 days)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: healthgov-runtime
          restartPolicy: OnFailure
          containers:
            - name: rotate-key
              image: hashicorp/vault:1.15.2
              env:
                - name: VAULT_ADDR
                  value: "https://vault.healthgov.svc.cluster.local:8200"
                - name: VAULT_CACERT
                  value: "/vault/userconfig/vault-tls/ca.crt"
              command:
                - /bin/sh
                - -c
                - |
                  # Authenticate with Vault using Kubernetes Service Account
                  export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                    role=healthgov-app \
                    jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token)
                  
                  # Rotate the transit key
                  echo "Rotating transit key: transit/keys/app-key..."
                  vault write -f transit/keys/app-key/rotate
                  
                  echo "Successfully rotated transit key!"
              volumeMounts:
                - name: vault-tls
                  mountPath: /vault/userconfig/vault-tls
                  readOnly: true
          volumes:
            - name: vault-tls
              secret:
                secretName: vault-tls
