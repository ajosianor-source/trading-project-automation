apiVersion: apps/v1
kind: Deployment
metadata: { name: tenant-service, namespace: healthgov }
spec:
  replicas: 3
  selector: { matchLabels: { app: tenant-service } }
  template:
    metadata: { labels: { app: tenant-service, plane: control } }
    spec:
      runtimeClassName: gvisor
      serviceAccountName: healthgov-runtime
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: app
          image: ghcr.io/example/healthgov/tenant-service:IMAGE_TAG
          ports: [{ name: http, containerPort: 8000 }]
          resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 512Mi } }
          readinessProbe: { httpGet: { path: /healthz, port: http } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: [ALL] } }
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: { sizeLimit: 32Mi } }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: plugin-registry, namespace: healthgov }
spec:
  replicas: 2
  selector: { matchLabels: { app: plugin-registry } }
  template:
    metadata: { labels: { app: plugin-registry, plane: control } }
    spec:
      serviceAccountName: healthgov-runtime
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: app
          image: ghcr.io/example/healthgov/plugin-registry:IMAGE_TAG
          ports: [{ name: http, containerPort: 8000 }]
          resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 512Mi } }
          readinessProbe: { httpGet: { path: /healthz, port: http } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: [ALL] } }
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: { sizeLimit: 32Mi } }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: reporting-service, namespace: healthgov }
spec:
  replicas: 2
  selector: { matchLabels: { app: reporting-service } }
  template:
    metadata: { labels: { app: reporting-service, plane: control } }
    spec:
      serviceAccountName: healthgov-runtime
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: app
          image: ghcr.io/example/healthgov/reporting-service:IMAGE_TAG
          ports: [{ name: http, containerPort: 8000 }]
          resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: "1", memory: 1Gi } }
          readinessProbe: { httpGet: { path: /healthz, port: http } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: [ALL] } }
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: { sizeLimit: 128Mi } }]
---
apiVersion: v1
kind: Service
metadata: { name: tenant-service, namespace: healthgov }
spec: { selector: { app: tenant-service }, ports: [{ name: http, port: 8000, targetPort: http }] }
---
apiVersion: v1
kind: Service
metadata: { name: plugin-registry, namespace: healthgov }
spec: { selector: { app: plugin-registry }, ports: [{ name: http, port: 8000, targetPort: http }] }
---
apiVersion: v1
kind: Service
metadata: { name: reporting-service, namespace: healthgov }
spec: { selector: { app: reporting-service }, ports: [{ name: http, port: 8000, targetPort: http }] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: saas-control-plane, namespace: healthgov }
spec:
  podSelector: { matchLabels: { plane: control } }
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{ podSelector: { matchLabels: { app: gateway } } }]
      ports: [{ port: 8000 }]
  egress:
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } } }]
      ports: [{ protocol: UDP, port: 53 }]
    - to: [{ podSelector: { matchLabels: { app: egress-gateway } } }]
      ports: [{ protocol: TCP, port: 15443 }]
