apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: healthgov
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_EXTERNAL_SECRETS_ROLE_ARN
automountServiceAccountToken: true
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata: { name: aws-secrets-manager, namespace: healthgov }
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-2
      auth:
        jwt:
          serviceAccountRef: { name: external-secrets }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: healthgov-runtime-secrets, namespace: healthgov }
spec:
  refreshInterval: 5m
  secretStoreRef: { name: aws-secrets-manager, kind: SecretStore }
  target:
    name: healthgov-runtime-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef: { key: healthgov-production/database-url }
    - secretKey: REDIS_URL
      remoteRef: { key: healthgov-production/redis-url }
    - secretKey: TOKENIZATION_KEY
      remoteRef: { key: healthgov-production/tokenization-key }
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef: { key: healthgov-production/oidc-client, property: client_secret }
    - secretKey: KAFKA_CLIENT_CONFIG
      remoteRef: { key: healthgov-production/kafka-client }
