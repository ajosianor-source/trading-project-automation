apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: phi-classifier, namespace: healthgov }
spec: { minAvailable: 1, selector: { matchLabels: { app: phi-classifier } } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: phi-classifier, namespace: healthgov }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: phi-classifier }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }

