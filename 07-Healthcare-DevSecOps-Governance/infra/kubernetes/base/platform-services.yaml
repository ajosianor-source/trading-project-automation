apiVersion: v1
kind: Service
metadata: { name: compliance-engine, namespace: healthgov }
spec: { selector: { app: compliance-engine }, ports: [{ name: http, port: 8000, targetPort: http }] }
---
apiVersion: v1
kind: Service
metadata: { name: cicd-orchestrator, namespace: healthgov }
