name: Data ingestion security
on:
  pull_request:
    paths: ["services/data-ingestion/**", ".github/workflows/ingestion-security.yml"]
  push:
    branches: [main]
    paths: ["services/data-ingestion/**"]
permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: services/data-ingestion } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: services/data-ingestion/pyproject.toml }
      - run: pip install -e ".[dev]"
      - run: ruff check app tests *.py
      - run: pytest -q
      - uses: returntocorp/semgrep-action@v1
        with: { config: p/python }
      - uses: snyk/actions/python@master
        env: { SNYK_TOKEN: "${{ secrets.SNYK_TOKEN }}" }
        with: { args: "--file=services/data-ingestion/pyproject.toml --severity-threshold=high" }

  container:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - uses: docker/build-push-action@v6
        with:
          context: services/data-ingestion
          push: true
          tags: ghcr.io/${{ github.repository }}/data-ingestion:${{ github.sha }}
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/data-ingestion:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository }}/data-ingestion:${{ github.sha }}

