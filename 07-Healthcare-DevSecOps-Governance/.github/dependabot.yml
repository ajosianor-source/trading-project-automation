version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule: { interval: weekly }
    groups:
      python-security:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /portal
    schedule: { interval: weekly }
    groups:
      frontend-security:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /
    schedule: { interval: weekly }
