services:
  postgres:
    image: postgres:16.8-alpine
    environment:
      POSTGRES_DB: healthgov
      POSTGRES_USER: healthgov
      POSTGRES_PASSWORD: local-only
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/data-ingestion/sql/001_ingestion.sql:/docker-entrypoint-initdb.d/002-ingestion.sql:ro
      - ./services/data-ingestion/sql/002_ethical_sources.sql:/docker-entrypoint-initdb.d/002b-ethical-sources.sql:ro
      - ./stakeholder-integrations/database/001_stakeholder_schema.sql:/docker-entrypoint-initdb.d/003-stakeholder.sql:ro
      - ./stakeholder-integrations/database/002_missing_modules.sql:/docker-entrypoint-initdb.d/004-completion-modules.sql:ro
      - ./stakeholder-integrations/database/003_application_role.sql:/docker-entrypoint-initdb.d/005-application-role.sql:ro
    ports: ["5432:5432"]
  redis:
    image: redis:7.4.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes: ["redis-data:/data"]
    ports: ["6379:6379"]
  kafka:
    image: redpandadata/redpanda:v24.3.13
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
      - --set
      - redpanda.auto_create_topics_enabled=false
    volumes: ["kafka-data:/var/lib/redpanda/data"]
    ports: ["9092:9092"]
  opa:
    image: openpolicyagent/opa:1.5.1-static
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policies"]
    volumes: ["./policies:/policies:ro"]
    ports: ["8181:8181"]
  hapi-fhir:
    image: hapiproject/hapi:v8.10.0-2
    environment:
      hapi.fhir.default_encoding: json
      hapi.fhir.allow_external_references: "false"
    ports: ["127.0.0.1:8090:8080"]
  phi-classifier:
    build: { context: ., args: { SERVICE: phi-classifier } }
    env_file: .env
    ports: ["8001:8000"]
  compliance-engine:
    build: { context: ., args: { SERVICE: compliance-engine } }
    env_file: .env
    ports: ["8002:8000"]
    depends_on: [opa]
  cicd-orchestrator:
    build: { context: ., args: { SERVICE: cicd-orchestrator } }
    env_file: .env
    ports: ["8003:8000"]
  audit-service:
    build: { context: ., args: { SERVICE: audit-service } }
    env_file: .env
    ports: ["8004:8000"]
  interoperability-gateway:
    build: { context: ., args: { SERVICE: interoperability-gateway } }
    env_file: .env
    ports: ["8005:8000"]
    depends_on: [kafka]
  iomt-security-hub:
    build: { context: ., args: { SERVICE: iomt-security-hub } }
    env_file: .env
    ports: ["8006:8000"]
    depends_on: [kafka]
  risk-engine:
    build: { context: ., args: { SERVICE: risk-engine } }
    env_file: .env
    ports: ["8007:8000"]
  deidentification-service:
    build: { context: ., args: { SERVICE: deidentification-service } }
    env_file: .env
    ports: ["8008:8000"]
  ml-security:
    build: { context: ., args: { SERVICE: ml-security } }
    env_file: .env
    ports: ["8009:8000"]
  tenant-service:
    build: { context: ., args: { SERVICE: tenant-service } }
    env_file: .env
    ports: ["8010:8000"]
  plugin-registry:
    build: { context: ., args: { SERVICE: plugin-registry } }
    env_file: .env
    ports: ["8011:8000"]
  reporting-service:
    build: { context: ., args: { SERVICE: reporting-service } }
    env_file: .env
    ports: ["8012:8000"]
  data-ingestion:
    build: { context: ./services/data-ingestion }
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://healthgov_app:local-app-only@postgres:5432/healthgov
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      TOKENIZATION_SECRET: local-development-secret-value-32-chars
      HAPI_FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      SYNTHEA_OUTPUT_DIR: /data/synthea
      BIDMC_DATA_DIR: /data/bidmc
      TCIA_DATA_DIR: /data/tcia
      MIMIC_DATA_DIR: /data/mimic
      MIMIC_APPROVAL_REFERENCE: ""
    volumes:
      - ./data/synthea:/data/synthea:ro
      - ./data/bidmc:/data/bidmc:ro
      - ./data/tcia:/data/tcia:ro
      - ./data/mimic:/data/mimic:ro
    ports: ["8013:8000"]
    depends_on: [postgres, kafka, hapi-fhir]
  data-store:
    build: { context: ./services/data-store }
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://healthgov_app:local-app-only@postgres:5432/healthgov
      TOKENIZATION_SECRET: local-development-secret-value-32-chars
      JWKS_URL: http://host.docker.internal:8080/.well-known/jwks.json
      JWT_ISSUER: https://auth.healthgov.local/
      JWT_AUDIENCE: healthgov-api
    command:
      - /bin/sh
      - -c
      - alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000
    ports: ["8014:8000"]
    depends_on: [postgres]
  alerting-engine:
    build: { context: ., args: { SERVICE: alerting-engine } }
    env_file: .env
    ports: ["8015:8000"]
  rbac-service:
    build: { context: ., args: { SERVICE: rbac-service } }
    env_file: .env
    ports: ["8016:8000"]
  data-lake-connector:
    build: { context: ., args: { SERVICE: data-lake-connector } }
    env_file: .env
    ports: ["8017:8000"]
  observability-service:
    build: { context: ., args: { SERVICE: observability-service } }
    env_file: .env
    ports: ["8018:8000"]
  healthcare-marketplace:
    build: { context: ., args: { SERVICE: healthcare-marketplace } }
    env_file: .env
    ports: ["8019:8000"]
  local-auth-bff:
    build: { context: ., args: { SERVICE: local-auth-bff } }
    environment:
      ENVIRONMENT: staging
      ALLOW_STAGING_SESSION: "true"
      SYNTHETIC_PHI_URL: http://synthetic-phi-service:8000
      COMPLIANCE_EVENT_URL: http://compliance-event-service:8000
      DSP_TOOLKIT_URL: http://dsp-toolkit-service:8000
      ISO27001_URL: http://iso27001-service:8000
      SOC2_URL: http://soc2-service:8000
      IOMT_SECURITY_URL: http://iomt-security-service:8000
      AUDIT_SERVICE_URL: http://audit-service:8000
      DATA_STORE_URL: http://data-store:8000
      DATA_INGESTION_URL: http://data-ingestion:8000
      COMPLIANCE_ENGINE_URL: http://compliance-engine:8000
      ALERTING_ENGINE_URL: http://alerting-engine:8000
      RISK_ENGINE_URL: http://risk-engine:8000
      MARKETPLACE_URL: http://healthcare-marketplace:8000
    ports: ["8080:8000"]
    depends_on:
      - audit-service
      - data-store
      - data-ingestion
      - compliance-engine
      - alerting-engine
      - risk-engine
      - healthcare-marketplace
      - synthetic-phi-service
      - compliance-event-service
      - dsp-toolkit-service
      - iso27001-service
      - soc2-service
      - iomt-security-service
  synthetic-phi-service:
    build: { context: ., args: { SERVICE: synthetic-phi-service } }
    environment: &staging-env
      ENVIRONMENT: staging
      DATABASE_URL: postgresql+asyncpg://healthgov_app:local-app-only@postgres:5432/healthgov
      REDIS_URL: redis://redis:6379/0
      OPA_URL: http://opa:8181
      JWKS_URL: http://local-auth-bff:8000/.well-known/jwks.json
      JWT_ISSUER: http://host.docker.internal:8080/
      JWT_AUDIENCE: healthgov-api
      TOKENIZATION_KEY: local-staging-tokenization-key-change-me
    ports: ["8020:8000"]
    depends_on: [postgres, kafka, redis, opa]
  compliance-event-service:
    build: { context: ., args: { SERVICE: compliance-event-service } }
    environment: *staging-env
    ports: ["8021:8000"]
    depends_on: [postgres, opa]
  dsp-toolkit-service:
    build: { context: ., args: { SERVICE: dsp-toolkit-service } }
    environment: *staging-env
    ports: ["8022:8000"]
    depends_on: [postgres, opa]
  iso27001-service:
    build: { context: ., args: { SERVICE: iso27001-service } }
    environment: *staging-env
    ports: ["8023:8000"]
    depends_on: [postgres, opa]
  soc2-service:
    build: { context: ., args: { SERVICE: soc2-service } }
    environment: *staging-env
    ports: ["8024:8000"]
    depends_on: [postgres, opa]
  iomt-security-service:
    build: { context: ., args: { SERVICE: iomt-security-service } }
    environment: *staging-env
    ports: ["8025:8000"]
    depends_on: [postgres, redis, kafka]

volumes:
  postgres-data:
  redis-data:
  kafka-data:
