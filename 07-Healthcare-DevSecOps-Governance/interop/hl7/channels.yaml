channels:
  - name: admissions-adt
    transport: mllp
    listen: "0.0.0.0:2575"
    allowed_messages: [ADT_A01, ADT_A03, ADT_A08]
    encoding: ER7
    tls:
      enabled: true
      client_certificate_required: true
      minimum_version: "1.3"
    validation:
      profile: profiles/adt.json
      reject_unknown_segments: true
      max_message_bytes: 1000000
    destination:
      topic: clinical.hl7v2.adt.v1
      dead_letter_topic: clinical.hl7v2.dlq.v1
      delivery: exactly_once

